<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="lh"><rect width="50" height="100"/></clipPath>
    <clipPath id="rh"><rect x="50" width="50" height="100"/></clipPath>
    <g id="arm">
      <line x1="50" y1="50" x2="50" y2="8"/>
      <line x1="50" y1="22" x2="42" y2="14"/>
      <line x1="50" y1="22" x2="58" y2="14"/>
      <line x1="50" y1="34" x2="43" y2="27"/>
      <line x1="50" y1="34" x2="57" y2="27"/>
    </g>
  </defs>

  <!-- Snowflake — left half -->
  <g clip-path="url(#lh)" stroke="#4db8f0" stroke-width="5.5" stroke-linecap="round" fill="none">
    <use href="#arm"/>
    <use href="#arm" transform="rotate(60,50,50)"/>
    <use href="#arm" transform="rotate(120,50,50)"/>
    <use href="#arm" transform="rotate(180,50,50)"/>
    <use href="#arm" transform="rotate(240,50,50)"/>
    <use href="#arm" transform="rotate(300,50,50)"/>
    <circle cx="50" cy="50" r="5.5" fill="#4db8f0" stroke="none"/>
  </g>

  <!-- Gear — right half -->
  <g clip-path="url(#rh)" fill="#1060a0">
    <!-- 12 teeth -->
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(0,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(30,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(60,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(90,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(120,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(150,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(180,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(210,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(240,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(270,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(300,50,50)"/>
    <rect x="47" y="6" width="6" height="14" rx="2" transform="rotate(330,50,50)"/>
    <!-- Body -->
    <circle cx="50" cy="50" r="35"/>
    <!-- Spokes -->
    <rect x="48.5" y="15" width="3" height="22" rx="1.5"/>
    <rect x="48.5" y="15" width="3" height="22" rx="1.5" transform="rotate(120,50,50)"/>
    <rect x="48.5" y="15" width="3" height="22" rx="1.5" transform="rotate(240,50,50)"/>
    <!-- Hub hole -->
    <circle cx="50" cy="50" r="13" fill="white"/>
  </g>
</svg>
